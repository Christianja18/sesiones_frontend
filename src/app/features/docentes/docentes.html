<div class="module-header">
  <div>
    <p class="eyebrow">Modulo 1</p>
    <h2>Docente</h2>
  </div>
  @if (result) {
    <span class="status-pill">ID {{ result.id }}</span>
  }
</div>

<form class="form-grid" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <label class="field">
    <span>Nombre</span>
    <input type="text" formControlName="nombre" autocomplete="name" maxlength="120" />
    @if (fieldInvalid('nombre')) {
      <small class="validation-message">{{ errorMessage('nombre') }}</small>
    }
  </label>

  <label class="field">
    <span>Email</span>
    <input type="email" formControlName="email" autocomplete="email" maxlength="160" />
    @if (fieldInvalid('email')) {
      <small class="validation-message">{{ errorMessage('email') }}</small>
    }
  </label>

  <label class="field field-wide">
    <span>Institucion</span>
    <input type="text" formControlName="institucion" autocomplete="organization" maxlength="180" />
    @if (fieldInvalid('institucion')) {
      <small class="validation-message">{{ errorMessage('institucion') }}</small>
    }
  </label>

  <div class="actions field-wide">
    <button class="button primary icon-only" type="submit" [disabled]="loading" [attr.aria-busy]="loading" aria-label="Registrar docente" title="Registrar docente">
      <app-icon [name]="loading ? 'loader' : 'save'" />
    </button>
  </div>
</form>

@if (apiError) {
  <div class="alert error" role="alert">
    <strong>{{ apiError.message }}</strong>
    @for (detail of apiError.details; track detail) {
      <span>{{ detail }}</span>
    }
  </div>
}

@if (result) {
  <div class="result-panel" aria-live="polite">
    <dl class="data-list">
      <div>
        <dt>Docente</dt>
        <dd>{{ result.nombre }}</dd>
      </div>
      <div>
        <dt>Email</dt>
        <dd>{{ result.email }}</dd>
      </div>
      <div>
        <dt>Institucion</dt>
        <dd>{{ result.institucion }}</dd>
      </div>
    </dl>
  </div>
}
